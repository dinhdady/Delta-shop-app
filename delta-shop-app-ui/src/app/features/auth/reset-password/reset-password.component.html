<div class="auth-wrapper">
  <!-- Visual Side -->
  <div class="auth-visual">
    <div class="visual-overlay"></div>
    <div class="visual-content">
      <h2 class="brand-name">GET BACK IN</h2>
      <p class="brand-tagline">NEVER GIVE UP</p>
    </div>
  </div>

  <!-- Content Side -->
  <div class="auth-content">
    <div class="auth-card">
      <div class="auth-header">
        <h1>ĐẶT LẠI MẬT KHẨU</h1>
        <p>Vui lòng nhập mã OTP được gửi đến email của bạn và mật khẩu mới.</p>
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email của bạn</label>
          <div class="input-wrapper">
            <lucide-icon name="mail" class="input-icon"></lucide-icon>
            <input
              type="email"
              formControlName="email"
              placeholder="name@example.com"
              readonly
              [class.error]="resetForm.get('email')?.invalid && resetForm.get('email')?.touched"
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Mã OTP (6 chữ số)</label>
          <div class="input-wrapper">
            <lucide-icon name="shield-alert" class="input-icon"></lucide-icon>
            <input
              type="text"
              formControlName="otp"
              placeholder="123456"
              maxlength="6"
              [class.error]="resetForm.get('otp')?.invalid && resetForm.get('otp')?.touched"
            >
          </div>
          <div class="error-text" *ngIf="resetForm.get('otp')?.invalid && resetForm.get('otp')?.touched">
            Vui lòng nhập đúng mã OTP 6 chữ số
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Mật khẩu mới</label>
          <div class="input-wrapper">
            <lucide-icon name="lock" class="input-icon"></lucide-icon>
            <input
              type="password"
              formControlName="newPassword"
              placeholder="••••••••"
              [class.error]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
            >
          </div>
          <div class="error-text" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
            Mật khẩu phải từ 6 ký tự trở lên
          </div>
        </div>

        <div class="alert-success" *ngIf="successMessage">
          <lucide-icon name="check-circle" class="alert-icon"></lucide-icon>
          {{ successMessage }}
        </div>

        <div class="alert-error" *ngIf="errorMessage">
          <lucide-icon name="alert-circle" class="alert-icon"></lucide-icon>
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="resetForm.invalid || isLoading">
          <span class="spinner" *ngIf="isLoading"></span>
          <span *ngIf="!isLoading">XÁC NHẬN</span>
        </button>
      </form>
    </div>
  </div>
</div>
