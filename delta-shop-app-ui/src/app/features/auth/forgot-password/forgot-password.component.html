<div class="auth-wrapper">
  <!-- Visual Side -->
  <div class="auth-visual">
    <div class="visual-overlay"></div>
    <div class="visual-content">
      <h2 class="brand-name">GET BACK IN</h2>
      <p class="brand-tagline">NEVER GIVE UP</p>
    </div>
  </div>

  <!-- Content Side -->
  <div class="auth-content">
    <div class="auth-card">
      <div class="auth-header">
        <h1>QUÊN MẬT KHẨU</h1>
        <p>Nhập email của bạn để bắt đầu quá trình khôi phục tài khoản</p>
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email của bạn</label>
          <div class="input-wrapper">
            <lucide-icon name="mail" class="input-icon"></lucide-icon>
            <input
              type="email"
              formControlName="email"
              placeholder="name@example.com"
              [class.error]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
            >
          </div>
        </div>

        <div class="alert-success" *ngIf="successMessage">
          <lucide-icon name="check-circle" class="alert-icon"></lucide-icon>
          {{ successMessage }}
        </div>

        <div class="alert-error" *ngIf="errorMessage">
          <lucide-icon name="alert-circle" class="alert-icon"></lucide-icon>
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="forgotForm.invalid || isLoading">
          <span class="spinner" *ngIf="isLoading"></span>
          <span *ngIf="!isLoading">GỬI YÊU CẦU</span>
        </button>

        <p class="auth-footer">
          <a routerLink="/auth/login" class="back-link">
            <lucide-icon name="arrow-left" class="back-icon"></lucide-icon>
            Quay lại Đăng nhập
          </a>
        </p>
      </form>
    </div>
  </div>
</div>
