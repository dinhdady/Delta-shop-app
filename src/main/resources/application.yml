  frontend:
    url: http://localhost:4200

# ============================================================
# ACTUATOR
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ============================================================
# OPENAPI / SWAGGER
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Delta Sports API
    description: REST API for Delta Sports Equipment E-commerce Platform
    version: 1.0.0
    contact:
      name: Delta Sports Dev Team
      email: dev@delta-sports.vn

# ============================================================
# LOGGING
# ============================================================
logging:
  level:
    root: INFO
    com.hoangdinh.delta_shop_app: DEBUG
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
